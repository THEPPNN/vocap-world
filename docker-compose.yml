services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       vocabdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:         5000
      DATABASE_URL: postgresql://postgres:password@db:5432/vocabdb
      JWT_SECRET:   change_this_to_a_random_secret
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5000:5000"

  # ─── Frontend (local only — Railway deploys separately) ──────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""   # empty = use Vite proxy (docker internal)
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata: